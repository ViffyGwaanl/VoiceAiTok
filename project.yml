name: VoiceTok
options:
  bundleIdPrefix: com.voicetok
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  xcodeVersion: "16.0"
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - zh-Hans

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    OTHER_LINKER_FLAGS: "-ObjC $(inherited)"
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    DEVELOPMENT_LANGUAGE: en

targets:
  VoiceTok:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoiceTok
        excludes:
          - "Resources/Info.plist"
    info:
      path: VoiceTok/Resources/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleDisplayName: VoiceTok
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "6"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: VoiceTok needs microphone access for real-time speech transcription.
        NSSpeechRecognitionUsageDescription: VoiceTok uses speech recognition to transcribe media content.
        NSPhotoLibraryUsageDescription: VoiceTok can import media files from your photo library.
        NSDocumentsFolderUsageDescription: VoiceTok stores your media files and transcripts.
        UIBackgroundModes:
          - audio
        CFBundleDocumentTypes:
          - CFBundleTypeName: Video
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.movie
              - public.mpeg-4
              - com.apple.quicktime-movie
              - public.avi
          - CFBundleTypeName: Audio
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - com.apple.m4a-audio
              - public.aiff-audio
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicetok.app
        INFOPLIST_FILE: VoiceTok/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_BITCODE: NO
        OTHER_LINKER_FLAGS: "-ObjC $(inherited)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_TEAM: 3LJ45MFB74
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
